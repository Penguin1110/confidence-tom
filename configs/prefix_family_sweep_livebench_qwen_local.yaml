name: "prefix_family_sweep_livebench_qwen_local"
base_config: "prefix_oracle_gain_mapping"

dataset:
  benchmark: "livebench_reasoning"
  livebench: 30
  livebench_reasoning: 30
  limit: 30

execution:
  task_concurrency: 1
  retry_attempts: 3
  retry_backoff_sec: 2.0

timeouts:
  full_trace_sec: 1200
  small_worker_sec: 1200
  large_worker_sec: 600
  task_sec: 10800

small_workers:
  - model: "Qwen/Qwen3-14B"
    label: "Qwen-3-14B-Local"
    family: "qwen"
    max_tokens: 12288
    reasoning_effort: null
    backend: "local"
    local_model_name: "Qwen/Qwen3-14B"

large_workers:
  - model: "Qwen/Qwen2.5-14B-Instruct"
    label: "HF-Qwen2.5-14B"
    family: "local_qwen"
    max_tokens: 16384
    backend: "local"
    local_model_name: "Qwen/Qwen2.5-14B-Instruct"
    reasoning_effort: null
  - model: "mistralai/Ministral-8B-Instruct-2410"
    label: "HF-Ministral-8B"
    family: "local_mistral"
    max_tokens: 16384
    backend: "local"
    local_model_name: "mistralai/Ministral-8B-Instruct-2410"
    reasoning_effort: null

launcher:
  run_analysis: true
  overwrite_output_dir: false
  continue_on_error: true
  run_name_prefix: "local_livebench_"
