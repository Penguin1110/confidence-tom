# Confidence-ToM Experiment Configuration - Gemma-2-9B-IT
# ============================================================================
# 小模型：Gemma-2-9B-IT
# 資料集：GPQA + MATH 各 15 題
# 採樣次數：K=10
# ============================================================================

name: "confidence_tom_gemma2_9b"
output_dir: "results/gemma2_9b"
verbose: true
use_wandb: false
wandb_project: "confidence-tom"

# ============================================================================
# 第一階段：Generator (小模型 - Subject)
# ============================================================================
generator:
  model: "google/gemma-2-9b-it"  # Gemma-2-9B-IT
  temperature: 0.7
  max_tokens: 4096
  k_samples: 10     # K=10 次獨立採樣
  require_justification: true

# ============================================================================
# 第二階段：Observer (大模型 - 三組對照實驗)
# ============================================================================
observer:
  models:
    - "openai/gpt-4o"
  temperature: 0
  max_tokens: 2048
  
  experimental_groups:
    - name: "A_blind"
      description: "Blind Observer - 純 ToM 組，不知道正確答案"
      has_answer: false
      has_trap_declaration: false
    - name: "B_informed"
      description: "Informed Observer - 後見之明組，知道正確答案"
      has_answer: true
      has_trap_declaration: false
    - name: "C_frame_aware"
      description: "Frame-Aware Observer - P2+ 最強介入組，陷阱宣告 + 知道答案"
      has_answer: true
      has_trap_declaration: true

# ============================================================================
# 資料集設定：GPQA + MATH 各 15 題
# ============================================================================
dataset:
  name: "gpqa_math_mix"
  num_samples: 15  # 每種題型 15 題，總共約 30 題

# ============================================================================
# 評估設定
# ============================================================================
evaluation:
  metrics:
    - "prediction_accuracy"
    - "self_assessment_accuracy"
    - "overconfidence_detection"
    - "luck_factor_detection"

# ============================================================================
# 輸出設定
# ============================================================================
save_csv: true
save_json: true
generate_plots: true
