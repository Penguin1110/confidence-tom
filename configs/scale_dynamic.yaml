# Dynamic Benchmark Confidence Calibration Experiment
# =====================================================
# Tests whether confidence miscalibration varies with model scale
# using dynamic agent benchmarks (tau-bench, bird-sql, plancraft, intercode).

name: "scale_dynamic_confidence_experiment"
output_dir: "results/scale_dynamic"
observer_output_dir: "results/scale_dynamic_observer"

# --- Subject Models ---
# Scale axis: Qwen3 family (1.7B → 8B → 32B) + Llama-4 cross-family validation
# All models support native tool calling on OpenRouter.
scale_models:
  - id: "qwen/qwen3-8b"
    label: "Qwen-3-8B"
    tool_use: true
  - id: "qwen/qwen3-32b"
    label: "Qwen-3-32B"
    tool_use: true
  - id: "meta-llama/llama-4-scout"
    label: "Llama-4-Scout"
    tool_use: true
  - id: "meta-llama/llama-4-maverick"
    label: "Llama-4-Maverick"
    tool_use: true

# --- Generator Settings ---
generator:
  temperature: 0.7      # Diversity for K-sample behavioral confidence
  max_tokens: 4096
  k_samples: 10         # C_beh = fraction of 10 runs that succeed
  k_concurrency: 1      # Run K samples one-by-one for cleaner logs/checkpoints

# --- Dataset Settings ---
dataset:
  tasks_per_benchmark: 10
  benchmarks:
    tau_bench:
      enabled: true
      env: "retail"
      split: "test"
      max_steps: 20
      model_provider: "openrouter"
      user_model: "openai/gpt-4o-mini"
      user_model_provider: "openrouter"
      user_strategy: "llm"
      agent_strategy: "tool-calling"
    bird_sql:
      enabled: true
      split: "dev"
    plancraft:
      enabled: true     # requires: pip install plancraft
      split: "test"
    intercode:
      enabled: false    # requires: Docker + pip install intercode-bench
      env: "bash"

# --- Observer Models (large, for second-order judgment) ---
observer:
  models:
    - id: "anthropic/claude-opus-4.6"
      label: "claude_opus_4_6"
    - id: "google/gemini-3.1-pro-preview"
      label: "gemini_3_1_pro_preview"
    - id: "openai/gpt-5.4-pro"
      label: "gpt_5_4"
  temperature: 0.0
  max_tokens: 2048

# --- Concurrency ---
concurrency:
  max_per_model: 1      # Max simultaneous tasks per model (outer throttle)
  sequential_models: true
