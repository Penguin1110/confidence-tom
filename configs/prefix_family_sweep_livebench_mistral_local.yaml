name: "prefix_family_sweep_livebench_mistral_local"
base_config: "prefix_oracle_gain_mapping"

dataset:
  benchmark: "livebench_reasoning"
  livebench: 30
  livebench_reasoning: 30
  limit: 30

execution:
  task_concurrency: 1
  retry_attempts: 3
  retry_backoff_sec: 2.0

timeouts:
  full_trace_sec: 900
  small_worker_sec: 900
  large_worker_sec: 600
  task_sec: 7200

small_workers:
  - model: "mistralai/ministral-8b-2512"
    label: "Ministral-8B-Local"
    family: "mistral"
    max_tokens: 12288
    reasoning_effort: null
    backend: "local"
    local_model_name: "mistralai/Ministral-8B-Instruct-2410"

large_workers:
  - model: "openai/gpt-5.4"
    label: "GPT-5.4"
    family: "openai"
    max_tokens: 16384
    reasoning_effort: null
  - model: "anthropic/claude-opus-4.6"
    label: "Claude-Opus-4.6"
    family: "anthropic"
    max_tokens: 16384
    reasoning_effort: null

launcher:
  run_analysis: true
  overwrite_output_dir: false
  continue_on_error: true
  run_name_prefix: "local_livebench_"
