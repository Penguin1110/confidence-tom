name: "prefix_family_sweep"
base_config: "prefix_oracle_gain_mapping"

dataset:
  benchmark: "olympiadbench"
  limit: 50

execution:
  task_concurrency: 4
  retry_attempts: 3
  retry_backoff_sec: 2.0

small_workers:
  - model: "qwen/qwen3-14b:nitro"
    label: "Qwen-3-14B"
    family: "qwen"
    max_tokens: 12288
    reasoning_effort: null
  - model: "meta-llama/llama-4-scout"
    label: "Llama-4-Scout"
    family: "llama"
    max_tokens: 12288
    reasoning_effort: null
  - model: "mistralai/ministral-8b-2512"
    label: "Ministral-8B-2512"
    family: "mistral"
    max_tokens: 12288
    reasoning_effort: null

large_workers:
  - model: "openai/gpt-5.4"
    label: "GPT-5.4"
    family: "openai"
    max_tokens: 16384
    reasoning_effort: null
  - model: "anthropic/claude-opus-4.6"
    label: "Claude-Opus-4.6"
    family: "anthropic"
    max_tokens: 16384
    reasoning_effort: null

launcher:
  run_analysis: true
  overwrite_output_dir: false
