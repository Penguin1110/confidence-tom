# Scale-Dependent Confidence Miscalibration Experiment
# ====================================================
# Tests whether confidence miscalibration varies with model scale
# using same-family models (Gemma 3) at different parameter counts.

name: "scale_single_miscalibration_experiment"
output_dir: "outputs/results/scale"
verbose: true
use_wandb: false
wandb_project: "confidence-tom-scale"

# --- Subject Models (same family, different scale) ---
scale_models:
  - id: "qwen/qwen3-8b:nitro"
    label: "Qwen-3-8B"
    scale: "dense"
  - id: "qwen/qwen3-14b:nitro"
    label: "Qwen-3-14B"
    scale: "dense"
  - id: "qwen/qwen3-32b:nitro"
    label: "Qwen-3-32B"
    scale: "dense"
  - id: "meta-llama/llama-4-scout"
    label: "Llama-4-Scout"
    scale: "base"
  - id: "meta-llama/llama-4-maverick"
    label: "Llama-4-Maverick"
    scale: "base"
  - id: "openai/gpt-oss-20b"
    label: "GPT-OSS-20B"
    scale: "base"
  - id: "openai/gpt-oss-120b"
    label: "GPT-OSS-120B"
    scale: "base"

# --- Generator Settings ---
generator:
  temperature: 1.0      # Increased for K-sample diversity to avoid C_beh saturation
  max_tokens: 12288      # Keep a larger budget for open-ended tasks like OlympiadBench/LiveBench
  k_samples: 10          # Behavioral confidence via repeated sampling
  reasoning_effort: null # Set to "none" to disable provider-side thinking when supported

# --- Extractor (recover final answer/confidence from partial or messy outputs) ---
extractor:
  enabled: true
  model: "google/gemini-3.1-flash-lite-preview"
  max_tokens: 512
  temperature: 0.0
  store_raw_samples: true
  raw_truncate_chars: 1200
  request_timeout_sec: 600

# --- Dataset Settings ---
dataset:
  num_per_source: 100    # Total ~300 (MMLU-Pro + GPQA-Zero + MATH-L5 + HardMMLU)
  # Optional explicit per-dataset counts (preferred for pilots / controlled runs).
  # When provided, these override num_per_source-derived defaults.
  # counts:
  #   mmlu_pro: 10
  #   gpqa: 10
  #   math_l5: 10
  #   mmlu_hard: 10

# --- Observer Models (for Part B: second-order experiment) ---
observer:
  models:
    - "openai/gpt-5.4"
    - "anthropic/claude-opus-4.6"
    - "google/gemini-3.1-pro-preview"
  temperature: 0
  max_tokens: 8192

# --- Concurrency ---
concurrency:
  max_concurrent_requests: 5  # Per model, to avoid rate limits
