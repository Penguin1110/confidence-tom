name: "prefix_family_sweep_reentry_olympiad_ollama"
base_config: "prefix_oracle_gain_mapping"

dataset:
  benchmark: "olympiadbench"
  limit: 50

execution:
  task_concurrency: 1
  retry_attempts: 3
  retry_backoff_sec: 2.0

timeouts:
  full_trace_sec: 1800
  small_worker_sec: 1800
  large_worker_sec: 900
  task_sec: 14400

